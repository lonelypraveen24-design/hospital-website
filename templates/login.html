<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – MediCarePlus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D1117;
      color: #E6EDF3;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .bg-shape {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none;
    }
    .bg1 { width:400px; height:400px; background:#FF6B6B; top:-100px; right:-100px; }
    .bg2 { width:300px; height:300px; background:#4ECDC4; bottom:-80px; left:-80px; }

    .card {
      background: #161B22;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: #fff; text-align: center;
      margin-bottom: 0.3rem;
    }
    .brand em { color: #FF6B6B; font-style: normal; }
    .subtitle { text-align: center; color: #8B949E; font-size: 0.9rem; margin-bottom: 2rem; }

    .error-box {
      background: rgba(255,107,107,0.15);
      border: 1px solid rgba(255,107,107,0.4);
      color: #FF6B6B;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
    label { font-size: 0.85rem; font-weight: 600; color: #8B949E; }
    input {
      background: #21262D;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: #E6EDF3;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #FF6B6B;
      box-shadow: 0 0 0 3px rgba(255,107,107,0.15);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      border: none; border-radius: 50px;
      padding: 0.9rem;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(255,107,107,0.35);
      margin-top: 0.5rem;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255,107,107,0.45); }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #8B949E; }
    .footer-link a { color: #FF6B6B; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .home-link {
      display: block; text-align: center; margin-bottom: 1.5rem;
      color: #8B949E; font-size: 0.85rem; text-decoration: none;
    }
    .home-link:hover { color: #FF6B6B; }
  </style>
</head>
<body>
  <div class="bg-shape bg1"></div>
  <div class="bg-shape bg2"></div>

  <div class="card">
    <a href="/" class="home-link">← Back to Home</a>
    <div class="brand">✚ Medicare<em>Plus</em></div>
    <p class="subtitle">Login to your patient account</p>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login/">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn">Login →</button>
    </form>

    <p class="footer-link">
      No account? <a href="/register/">Register here</a>
    </p>
  </div>
</body>
</html>
