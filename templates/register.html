<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – MediCarePlus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0D1117; color: #E6EDF3;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .bg-shape { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; }
    .bg1 { width:400px; height:400px; background:#A29BFE; top:-100px; left:-100px; }
    .bg2 { width:300px; height:300px; background:#4ECDC4; bottom:-80px; right:-80px; }
    .card {
      background: #161B22;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 2.5rem;
      width: 100%; max-width: 440px;
      position: relative; z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .brand { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: #fff; text-align: center; margin-bottom: 0.3rem; }
    .brand em { color: #FF6B6B; font-style: normal; }
    .subtitle { text-align: center; color: #8B949E; font-size: 0.9rem; margin-bottom: 2rem; }
    .error-box { background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.4); color: #FF6B6B; padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.9rem; margin-bottom: 1.2rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
    label { font-size: 0.85rem; font-weight: 600; color: #8B949E; }
    input { background: #21262D; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.8rem 1rem; color: #E6EDF3; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: #A29BFE; box-shadow: 0 0 0 3px rgba(162,155,254,0.15); }
    .btn { width: 100%; background: linear-gradient(135deg, #A29BFE, #6C5CE7); color: #fff; border: none; border-radius: 50px; padding: 0.9rem; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 8px 24px rgba(162,155,254,0.35); margin-top: 0.5rem; }
    .btn:hover { transform: translateY(-2px); }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #8B949E; }
    .footer-link a { color: #FF6B6B; font-weight: 600; text-decoration: none; }
    .home-link { display: block; text-align: center; margin-bottom: 1.5rem; color: #8B949E; font-size: 0.85rem; text-decoration: none; }
    .home-link:hover { color: #FF6B6B; }
  </style>
</head>
<body>
  <div class="bg-shape bg1"></div>
  <div class="bg-shape bg2"></div>
  <div class="card">
    <a href="/" class="home-link">← Back to Home</a>
    <div class="brand">✚ Medicare<em>Plus</em></div>
    <p class="subtitle">Create your patient account</p>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/register/">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="username" required autofocus/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="+91 XXXXX"/>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 8 characters" required/>
      </div>
      <button type="submit" class="btn">Create Account →</button>
    </form>

    <p class="footer-link">Already have account? <a href="/login/">Login here</a></p>
  </div>
</body>
</html>
